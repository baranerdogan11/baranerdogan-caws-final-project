<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Legend -->
<text x="40" y="26" font-size="13" font-weight="500" fill="#2C2C2A">VaulTech — AWS architecture</text>
<rect x="480" y="14" width="12" height="12" rx="2" fill="#1D9E75" opacity="0.6"/>
<text x="496" y="25" font-size="11" fill="#444441">Request flow</text>
<rect x="580" y="14" width="12" height="12" rx="2" fill="#534AB7" opacity="0.6"/>
<text x="596" y="25" font-size="11" fill="#444441">Setup</text>

<!-- User browser -->
<rect x="260" y="44" width="160" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="70" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">User browser</text>
<text x="340" y="86" text-anchor="middle" font-size="11" fill="#5F5E5A">http://&lt;ip&gt;:8501</text>

<!-- Arrow: browser → Fargate -->
<line x1="340" y1="96" x2="340" y2="130" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="348" y="116" font-size="11" fill="#1D9E75">request</text>

<!-- ECS/Fargate container -->
<rect x="40" y="130" width="600" height="110" rx="12" fill="#1D9E75" opacity="0.08" stroke="#1D9E75" stroke-width="0.5"/>
<text x="56" y="150" font-size="11" font-weight="500" fill="#0F6E56">Amazon ECS / Fargate</text>

<rect x="180" y="158" width="320" height="68" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Streamlit app</text>
<text x="340" y="208" text-anchor="middle" font-size="11" fill="#0F6E56">Load gold data · Batch predictions · Debug panel</text>

<rect x="528" y="158" width="96" height="68" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="576" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#26215C">ECR</text>
<text x="576" y="208" text-anchor="middle" font-size="11" fill="#3C3489">Docker image</text>
<line x1="528" y1="192" x2="502" y2="192" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="56" y="158" width="96" height="68" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="104" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#26215C">S3</text>
<text x="104" y="208" text-anchor="middle" font-size="11" fill="#3C3489">gold parquet</text>
<line x1="152" y1="192" x2="178" y2="192" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Arrow: Streamlit → SageMaker -->
<line x1="340" y1="240" x2="340" y2="278" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="348" y="262" font-size="11" fill="#1D9E75">invoke_endpoint</text>

<!-- SageMaker section -->
<rect x="40" y="278" width="600" height="110" rx="12" fill="#378ADD" opacity="0.08" stroke="#378ADD" stroke-width="0.5"/>
<text x="56" y="298" font-size="11" font-weight="500" fill="#185FA5">Amazon SageMaker</text>

<rect x="180" y="306" width="320" height="68" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="334" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">Real-time endpoint</text>
<text x="340" y="352" text-anchor="middle" font-size="11" fill="#185FA5">vaultech-bath-endpoint · ml.t2.medium · eu-west-1</text>

<rect x="528" y="306" width="96" height="68" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="576" y="330" text-anchor="middle" font-size="12" font-weight="500" fill="#042C53">Model Registry</text>
<text x="576" y="348" text-anchor="middle" font-size="11" fill="#185FA5">Model Package</text>
<line x1="528" y1="340" x2="502" y2="340" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="56" y="306" width="96" height="68" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="104" y="330" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">S3</text>
<text x="104" y="348" text-anchor="middle" font-size="11" fill="#185FA5">model.tar.gz</text>
<line x1="152" y1="340" x2="178" y2="340" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Arrow: endpoint → container -->
<line x1="340" y1="374" x2="340" y2="412" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="348" y="396" font-size="11" fill="#1D9E75">CSV payload</text>

<!-- sklearn container -->
<rect x="180" y="412" width="320" height="68" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="340" y="440" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">sklearn container</text>
<text x="340" y="458" text-anchor="middle" font-size="11" fill="#854F0B">GradientBoostingRegressor · numpy 1.24.4 · Python 3.9</text>

<!-- Return path arrow -->
<path d="M 175 446 L 140 446 L 140 192 L 178 192" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)" fill="none"/>
<text x="128" y="330" text-anchor="middle" font-size="11" fill="#1D9E75" transform="rotate(-90,128,330)">prediction response</text>

<!-- Summary box -->
<rect x="40" y="504" width="600" height="80" rx="8" fill="none" stroke="#B4B2A9" stroke-dasharray="4 3" stroke-width="0.5"/>
<text x="340" y="524" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Data flow when user selects a piece</text>
<text x="340" y="544" text-anchor="middle" font-size="11" fill="#5F5E5A">Browser → Fargate (Streamlit) → SageMaker endpoint → sklearn model</text>
<text x="340" y="562" text-anchor="middle" font-size="11" fill="#5F5E5A">→ predicted bath time → debug panel (payload, response, latency ms)</text>
</svg>
